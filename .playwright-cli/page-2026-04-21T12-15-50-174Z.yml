                          - text: ":"
                          - generic [ref=e932]: "fix: pass pre-built siteIdentity through quota layer to preserve allowDevelopment The route-level allowDevelopment flag (which permits localhost/dev sites for trial and authenticated requests) was lost because reserveGenerationQuota and getQuotaStatus rebuilt siteIdentity from scratch internally. This caused DEVELOPMENT_SITE_NOT_ALLOWED (403) for every localhost request, which the plugin translated into \"Authentication required. Please log in to continue.\" Both quota functions now accept an optional pre-built siteIdentity parameter. When provided, they use it directly instead of rebuilding — preserving the allowDevelopment flag set at the route level. Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>"
